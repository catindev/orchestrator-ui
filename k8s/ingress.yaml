apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: orchestrator-ui
  labels:
    app.kubernetes.io/name: orchestrator-ui
spec:
  rules:
    - host: orchestrator-ui.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: orchestrator-ui
                port:
                  number: 80
