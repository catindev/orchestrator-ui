apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator-ui
  labels:
    app.kubernetes.io/name: orchestrator-ui
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: orchestrator-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: orchestrator-ui
    spec:
      containers:
        - name: orchestrator-ui
          image: ghcr.io/catindev/orchestrator-ui:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: orchestrator-ui-config
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
